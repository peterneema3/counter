<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CHANGE THIS -->
<title>Neema Petr - 77366 - Counter</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* Page layout */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* Gradient background (you can change colours) */
    background: linear-gradient(135deg,#ffb6b9,#fcd5ce,#cdb4db,#a2d2ff);
}

/* Main container */
.container{
    text-align:center;
}

/* Title */
h1{
    font-size:40px;
    margin-bottom:20px;
}

/* Counter number */
#value{
    font-size:80px;
    font-weight:bold;
    color:#222;
}

/* Button container */
.button-container{
    margin-top:30px;
}

/* Buttons */
.btn{
    padding:12px 20px;
    margin:10px;
    font-size:16px;
    border-radius:8px;
    border:2px solid #333;
    background:white;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#222;
    color:white;
}

</style>
</head>

<body>

<div class="container">

    <h1>Counter</h1>

    <!-- Counter display -->
    <span id="value">0</span>

    <!-- Buttons -->
    <div class="button-container">

        <button class="btn" id="decrease">
            <i class="fa-solid fa-minus"></i> Decrease
        </button>

        <button class="btn" id="reset">
            <i class="fa-solid fa-rotate-left"></i> Reset
        </button>

        <button class="btn" id="increase">
            <i class="fa-solid fa-plus"></i> Increase
        </button>

    </div>

</div>

<script>

/* Counter variable */
let count = 0;

/* Select elements */
const value = document.querySelector("#value");
const btnContainer = document.querySelector(".button-container");

/* Event listener on the container */
btnContainer.addEventListener("click", (e) => {

    /* Only respond if a button was clicked */
    if (e.target.classList.contains("btn")) {

        /* Check which button was clicked */
        if (e.target.id === "increase") {
            count++;

        } else if (e.target.id === "decrease") {
            count--;

        } else {
            count = 0;
        }

        /* Update number on screen */
        value.innerText = count;

        /* Change colour based on value */
        if (count > 0) {
            value.style.color = "green";

        } else if (count < 0) {
            value.style.color = "red";

        } else {
            value.style.color = "#222";
        }
    }
});

</script>

</body>
</html>
